<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Přehled produkce — obchodník</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --border: #2d3a4f;
      --text: #e8edf4;
      --muted: #8b9cb3;
      --accent: #3d8bfd;
      --accent-dim: rgba(61, 139, 253, 0.15);
      --radius: 12px;
      --font: "DM Sans", system-ui, -apple-system, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      background: radial-gradient(ellipse 120% 80% at 50% -20%, #1e3a5f 0%, transparent 50%), var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }
    header {
      margin-bottom: 2rem;
    }
    header h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 0.35rem;
    }
    header p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    label.file-btn {
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1.1rem;
      background: var(--accent);
      color: #fff;
      border-radius: var(--radius);
      font-weight: 500;
      font-size: 0.9rem;
      border: none;
    }
    label.file-btn:hover { filter: brightness(1.08); }
    input[type="file"] { position: absolute; width: 0; height: 0; opacity: 0; }
    button.ghost {
      cursor: pointer;
      padding: 0.65rem 1.1rem;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 500;
    }
    button.ghost:hover { border-color: var(--accent); color: var(--accent); }
    .hint {
      font-size: 0.8rem;
      color: var(--muted);
      width: 100%;
    }
    .empty {
      padding: 3rem 1.5rem;
      text-align: center;
      color: var(--muted);
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }
    .grid-select {
      display: grid;
      gap: 1.25rem;
      grid-template-columns: 220px 1fr;
      align-items: start;
    }
    @media (max-width: 720px) {
      .grid-select { grid-template-columns: 1fr; }
    }
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.1rem;
    }
    .panel h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin: 0 0 0.75rem;
      font-weight: 600;
    }
    select.trader {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
    }
    .kpis {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
    }
    .kpi {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
    }
    .kpi .label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 0.35rem;
    }
    .kpi .value {
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .kpi .value.accent { color: var(--accent); }
    section.table-section {
      margin-top: 2rem;
    }
    section.table-section h2 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 0.75rem;
    }
    .table-scroll {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td {
      padding: 0.65rem 0.85rem;
      text-align: right;
      border-bottom: 1px solid var(--border);
    }
    th:first-child, td:first-child {
      text-align: left;
      position: sticky;
      left: 0;
      background: var(--surface);
      z-index: 1;
      box-shadow: 4px 0 8px -4px rgba(0,0,0,0.3);
    }
    th {
      font-weight: 600;
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--accent-dim); }
    tr:hover td:first-child { background: #1e2a3d; }
    .err {
      background: rgba(220, 80, 80, 0.12);
      border: 1px solid rgba(220, 80, 80, 0.35);
      color: #f5a5a5;
      padding: 0.85rem 1rem;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Přehled produkce</h1>
      <p>Načtěte Excel (.xlsx): první sloupec = jméno obchodníka, další sloupce = kategorie hodnot.</p>
    </header>

    <div class="toolbar">
      <label class="file-btn">
        <input type="file" id="file" accept=".xlsx,.xls" />
        Vybrat soubor…
      </label>
      <button type="button" class="ghost" id="loadSample">Načíst vzorový soubor</button>
      <span class="hint">Očekávaný formát: 1. řádek = názvy sloupců (Jméno + kategorie), další řádky = hodnoty.</span>
    </div>

    <div id="error" class="err" hidden></div>
    <div id="main"></div>
  </div>

  <script>
    const nf = new Intl.NumberFormat("cs-CZ");

    function showError(msg) {
      const el = document.getElementById("error");
      el.textContent = msg;
      el.hidden = !msg;
    }

    function parseWorkbook(wb) {
      const sheetName = wb.SheetNames[0];
      const ws = wb.Sheets[sheetName];
      const raw = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: false });
      if (!raw.length) throw new Error("List je prázdný.");

      const headerRow = raw[0].map((c) => (c == null || String(c).trim() === "" ? null : String(c).trim()));
      const nameIdx = 0;
      const categoryHeaders = [];
      for (let i = 0; i < headerRow.length; i++) {
        if (i === nameIdx) continue;
        const h = headerRow[i];
        if (h != null) categoryHeaders.push({ col: i, key: h });
      }
      if (!categoryHeaders.length) throw new Error("V souboru nejsou žádné sloupce kategorií (kromě jména).");

      const traders = [];
      for (let r = 1; r < raw.length; r++) {
        const row = raw[r];
        if (!row || row.length === 0) continue;
        const nameCell = row[nameIdx];
        const name = nameCell == null ? "" : String(nameCell).trim();
        if (!name) continue;

        const metrics = {};
        for (const { col, key } of categoryHeaders) {
          const v = row[col];
          const num = typeof v === "number" ? v : parseFloat(String(v).replace(/\s/g, "").replace(",", "."));
          metrics[key] = Number.isFinite(num) ? num : null;
        }
        traders.push({ name, metrics });
      }
      if (!traders.length) throw new Error("Žádné řádky s jménem obchodníka.");

      const nameColumnTitle = headerRow[nameIdx] || "Jméno";
      return { nameColumnTitle, categories: categoryHeaders.map((c) => c.key), traders };
    }

    function render(data) {
      const main = document.getElementById("main");
      const { nameColumnTitle, categories, traders } = data;

      const options = traders.map((t) => `<option value="${escapeHtml(t.name)}">${escapeHtml(t.name)}</option>`).join("");

      main.innerHTML = `
        <div class="grid-select">
          <div class="panel">
            <h2>Obchodník</h2>
            <select class="trader" id="traderSelect" aria-label="Vyberte obchodníka">${options}</select>
          </div>
          <div class="panel">
            <h2>Klíčové údaje</h2>
            <div class="kpis" id="kpis"></div>
          </div>
        </div>
        <section class="table-section">
          <h2>Všichni obchodníci</h2>
          <div class="table-scroll">
            <table>
              <thead>
                <tr>
                  <th>${escapeHtml(nameColumnTitle)}</th>
                  ${categories.map((c) => `<th>${escapeHtml(c)}</th>`).join("")}
                </tr>
              </thead>
              <tbody>
                ${traders
                  .map(
                    (t) => `
                  <tr data-name="${escapeAttr(t.name)}">
                    <td>${escapeHtml(t.name)}</td>
                    ${categories.map((c) => `<td>${formatCell(t.metrics[c])}</td>`).join("")}
                  </tr>`
                  )
                  .join("")}
              </tbody>
            </table>
          </div>
        </section>
      `;

      const select = document.getElementById("traderSelect");
      const kpis = document.getElementById("kpis");

      function updateKpis(name) {
        const t = traders.find((x) => x.name === name);
        if (!t) return;
        kpis.innerHTML = categories
          .map(
            (c) => `
          <div class="kpi">
            <div class="label">${escapeHtml(c)}</div>
            <div class="value ${c === "Produkce" || c === "Provize" ? "accent" : ""}">${formatCell(t.metrics[c])}</div>
          </div>`
          )
          .join("");
      }

      select.addEventListener("change", () => updateKpis(select.value));
      updateKpis(select.value);

      main.querySelectorAll("tbody tr").forEach((tr) => {
        tr.style.cursor = "pointer";
        tr.addEventListener("click", () => {
          const n = tr.getAttribute("data-name");
          select.value = n;
          updateKpis(n);
        });
      });
    }

    function formatCell(v) {
      if (v == null || Number.isNaN(v)) return "—";
      return nf.format(v);
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function escapeAttr(s) {
      return escapeHtml(s).replace(/'/g, "&#39;");
    }

    function loadArrayBuffer(buf) {
      showError("");
      try {
        const wb = XLSX.read(buf, { type: "array" });
        const data = parseWorkbook(wb);
        render(data);
      } catch (e) {
        showError(e.message || "Soubor se nepodařilo načíst.");
        document.getElementById("main").innerHTML =
          '<div class="empty">Zkuste jiný soubor nebo zkontrolujte formát (první řádek = hlavičky).</div>';
      }
    }

    document.getElementById("file").addEventListener("change", (ev) => {
      const f = ev.target.files && ev.target.files[0];
      if (!f) return;
      const r = new FileReader();
      r.onload = () => loadArrayBuffer(new Uint8Array(r.result));
      r.readAsArrayBuffer(f);
    });

    document.getElementById("loadSample").addEventListener("click", async () => {
      try {
        const res = await fetch("vzor-produkce.xlsx");
        if (!res.ok) throw new Error("Vzor není k dispozici (spusťte lokální server z této složky).");
        const buf = new Uint8Array(await res.arrayBuffer());
        loadArrayBuffer(buf);
      } catch (e) {
        showError(e.message);
      }
    });

    document.getElementById("main").innerHTML =
      '<div class="empty">Vyberte soubor .xlsx nebo použijte tlačítko „Načíst vzorový soubor“ (vyžaduje lokální server).</div>';
  </script>
</body>
</html>
