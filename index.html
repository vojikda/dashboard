<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d3d2e" />
  <title>Moje denní peníze</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f4f2ee;
      --surface: #ffffff;
      --text: #1a1f1c;
      --muted: #5c6560;
      --accent: #0d3d2e;
      --line: #e0ddd6;
      --shadow: 0 4px 24px rgba(13, 61, 46, 0.08);
      --radius: 16px;
      --font: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-t: env(safe-area-inset-top, 0px);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
      padding: calc(1rem + var(--safe-t)) 1rem calc(1.25rem + var(--safe-b));
    }
    .shell {
      max-width: 28rem;
      margin: 0 auto;
    }
    h1.page-title {
      font-size: clamp(1.5rem, 5vw, 1.85rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0 0 1.25rem;
      color: var(--accent);
    }
    .error {
      display: none;
      padding: 0.75rem 1rem;
      background: #fff0f0;
      border: 1px solid #f0c4c4;
      color: #8b2e2e;
      border-radius: 12px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .error.show { display: block; }
    .card-name {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1.25rem 1.35rem;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      margin-bottom: 1rem;
    }
    .card-name .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 0.35rem;
    }
    .card-name .name {
      font-size: clamp(1.25rem, 4.5vw, 1.5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      word-break: break-word;
    }
    select.trader {
      width: 100%;
      margin-top: 0.85rem;
      padding: 0.65rem 0.75rem;
      font-family: inherit;
      font-size: 1rem;
      border-radius: 10px;
      border: 2px solid var(--line);
      background: var(--bg);
      color: var(--text);
    }
    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
    }
    @media (min-width: 380px) {
      .metrics { gap: 0.75rem; }
    }
    .metric {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 1rem 1rem 1.1rem;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .metric .k {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 0.4rem;
    }
    .metric .v {
      font-size: clamp(1.15rem, 4vw, 1.35rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--accent);
    }
    .metric.wide {
      grid-column: 1 / -1;
    }
    .empty {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1 class="page-title">Moje denní peníze</h1>
    <div id="err" class="error" role="alert"></div>
    <div id="app"></div>
  </div>

  <script>
    const nf = new Intl.NumberFormat("cs-CZ");
    const ORDER = ["Provize", "eKoruny", "Produkce", "Smlouvy"];

    const errEl = document.getElementById("err");
    const appEl = document.getElementById("app");

    function setError(msg) {
      errEl.textContent = msg || "";
      errEl.classList.toggle("show", Boolean(msg));
    }

    function parseBook(wb) {
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: false });
      if (!rows.length) throw new Error("Tabulka je prázdná.");

      const header = rows[0].map((c) => (c == null ? "" : String(c).trim()));
      const nameCol = 0;
      const keys = [];
      for (let i = 0; i < header.length; i++) {
        if (i === nameCol) continue;
        const h = header[i];
        if (h) keys.push({ col: i, key: h });
      }
      if (!keys.length) throw new Error("Chybí sloupce s čísly (kromě jména).");

      const traders = [];
      for (let r = 1; r < rows.length; r++) {
        const row = rows[r];
        if (!row) continue;
        const rawName = row[nameCol];
        const name = rawName == null ? "" : String(rawName).trim();
        if (!name) continue;
        const metrics = {};
        for (const { col, key } of keys) {
          const v = row[col];
          const n = typeof v === "number" ? v : parseFloat(String(v).replace(/\s/g, "").replace(",", "."));
          metrics[key] = Number.isFinite(n) ? n : null;
        }
        traders.push({ name, metrics });
      }
      if (!traders.length) throw new Error("V datech nejsou žádní obchodníci.");

      const categories = keys.map((k) => k.key);
      const nameTitle = header[nameCol] || "Jméno obchodníka";
      return { nameTitle, categories, traders };
    }

    function formatNum(v) {
      if (v == null || Number.isNaN(v)) return "—";
      return nf.format(v);
    }

    function orderedKeys(categories) {
      const set = new Set(categories);
      const out = [];
      for (const k of ORDER) if (set.has(k)) out.push(k);
      for (const k of categories) if (!ORDER.includes(k)) out.push(k);
      return out;
    }

    function render(data) {
      const { nameTitle, categories, traders } = data;
      const keys = orderedKeys(categories);
      const options = traders
        .map((t) => `<option value="${escapeAttr(t.name)}">${escapeHtml(t.name)}</option>`)
        .join("");

      appEl.innerHTML = `
        <div class="card-name">
          <div class="label">${escapeHtml(nameTitle)}</div>
          <div class="name" id="displayName"></div>
          ${
            traders.length > 1
              ? `<label class="label" for="sel" style="margin-top:0.75rem;display:block;">Vyberte obchodníka</label>
                 <select class="trader" id="sel" aria-label="Obchodník">${options}</select>`
              : ""
          }
        </div>
        <div class="metrics" id="metrics"></div>
      `;

      const sel = document.getElementById("sel");
      const displayName = document.getElementById("displayName");
      const metricsEl = document.getElementById("metrics");

      function show(name) {
        const t = traders.find((x) => x.name === name) || traders[0];
        displayName.textContent = t.name;
        metricsEl.innerHTML = keys
          .map((k) => {
            const wide = keys.length % 2 === 1 && k === keys[keys.length - 1];
            return `<div class="metric${wide ? " wide" : ""}">
              <div class="k">${escapeHtml(k)}</div>
              <div class="v">${formatNum(t.metrics[k])}</div>
            </div>`;
          })
          .join("");
      }

      if (sel) {
        sel.addEventListener("change", () => show(sel.value));
        show(sel.value);
      } else {
        show(traders[0].name);
      }
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
    function escapeAttr(s) {
      return escapeHtml(s).replace(/'/g, "&#39;");
    }

    function loadBuffer(buf) {
      setError("");
      try {
        const wb = XLSX.read(buf, { type: "array" });
        render(parseBook(wb));
      } catch (e) {
        setError(e.message || "Ukázková data se nepodařilo zpracovat.");
        appEl.innerHTML = '<div class="empty">Nepodařilo se zobrazit ukázku.</div>';
      }
    }

    (async function init() {
      appEl.innerHTML = '<div class="empty">Načítání ukázky…</div>';
      try {
        const res = await fetch("vzorova-data.xlsx", { cache: "no-store" });
        if (!res.ok) throw new Error("Soubor s ukázkou není k dispozici.");
        loadBuffer(new Uint8Array(await res.arrayBuffer()));
      } catch (e) {
        setError(e.message || "Chyba při načítání.");
        appEl.innerHTML = "";
      }
    })();
  </script>
</body>
</html>
